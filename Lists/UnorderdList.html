<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unordered List</title>
</head>
<body>
    
    <!DOCTYPE html>
<html>
<body>

<h2>Unordered List with Circle Bullets</h2>

<ul type="circle">
  <li>Coffee</li>
  <li>Tea</li>
  <li>Milk</li>
</ul>  

<ul type="disc">
  <li>Coffee</li>
  <li>Tea</li>
  <li>Milk</li>
</ul>  

<ul type="square">
  <li>Coffee</li>
  <li>Tea</li>
  <li>Milk</li>
</ul> 

<ul>
    <li>Tea:
        <ul>
            <li>Milk</li>
            <li>Tea powder</li>
            <li>Sugar</li>
        </ul>
    </li>

    <li>Coffee:
        <ul>
            <li>Milk</li>
            <li>Coffe Powder</li>
            <li>Sugar</li>
        </ul>
    </li>
</ul>
</body>
</html>


</body>
</html>
