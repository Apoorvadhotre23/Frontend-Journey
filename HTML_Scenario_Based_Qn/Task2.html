<!--You want to upload multiple images in one go. Which attribute will you use?

👉 (Use multiple in <input type="file">) -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task_2</title>
</head>
<body>
    <form action="#">
        <h3>Upload multiple images</h3>
        <input type="file" accept="image/*" multiple><br><br>

        <input type="submit" value="submit">
    </form>
    
</body>
</html>
