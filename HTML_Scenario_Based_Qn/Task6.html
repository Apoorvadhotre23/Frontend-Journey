<!--You want to validate a phone number to allow only 10 digits. How will you do it?

👉 (pattern="\d{10}")
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Number</title>
</head>
<body>

    <form action="">
        <label for="phone">Phone Number</label>
    <input type="text" id="phone" name="phone" pattern="[6-9]\d{9}" title="Enter exactly 10 digits 
    and number start with 6" required>
  
    <input type="submit" value="Submit">
    </form>
    
</body>
</html>
