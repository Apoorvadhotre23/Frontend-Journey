<!--You want a mandatory input field. How do you make it required?

👉 (required attribute)-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>

    <h3>You want a mandatory input field</h3>

    <form action="">

    <label for="name">Name</label>  <span style="color:red;">*</span>
    <input type="text" id="name" required title="This field is required"><br><br>

     <label for="password">Password</label><span style="color:red;">*</span>
     <input type="password" id="password" required ><br><br>
   

    <label for="name">University Number</label>
    <input type="text" id="name" disabled>



        <input type="submit">
    </form>
 
    
    
</body>
</html>
