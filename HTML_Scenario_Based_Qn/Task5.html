<!--You want to select multiple options from a dropdown. What attribute do you use?

👉 (multiple in <select>)-->

    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Drop down menu</title>
    </head>
    <body>

        <h3>Drop Down menu</h3>

        <label for="menu">Fruits Menu</label><br> 
        <select name="menu" id="menu" multiple>
            <option value="apple">Apple</option>
            <option value="mango">Mango</option>
            <option value="kiwi">Kiwi</option>
            <option value="Pomogranate">Pomogranate</option>
            <option value="guava">Guava</option>
        </select>  <br><br>
      
        
         <label for="menu">Fruits Menu</label><br>
        <select name="menu" id="menu">
            <option value="" disabled selected>Fruits</option>
            <option value="apple">Apple</option>
            <option value="mango">Mango</option>
            <option value="kiwi">Kiwi</option>
            <option value="Pomogranate">Pomogranate</option>
            <option value="guava">Guava</option>
        </select>

       
    </body>
    </html>
