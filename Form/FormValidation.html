<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>

</head>
<body>
    <h3>Form</h3>
    <div>
    <form action="#">
        <label for="name">Name: </label>
        <input type="text" id="name" pattern="[A-Za-z]{4,}" required>
        <br> <br>
        <label for="pin">PIN Code</label>
        <input type="text" name="pin" pattern="[0-9]{6}" required>
        <br> <br>

        <label for="tel">Telephone:</label>
        <input type="tel" pattern="[6-9][0-9]{9}">
        <br> <br>

        <label for="password">Password</label>
        <input type="password" pattern="(?=.*[A-Z])(?=.*[a-z])(?=.[0-9])(?=.*[!@#$%^&*]).{8,}"
        title="Password must contain at least 8 characters, including one uppercase 
        letter, one lowercase letter, one number, and one special character.">
        
        <br> <br>

        <small>
Password must contain:
<ul>
    <li>At least 8 characters</li>
    <li>One uppercase letter (A-Z)</li>
    <li>One lowercase letter (a-z)</li>
    <li>One number (0-9)</li>
    <li>One special character (!@#$%^&*, etc.)</li>
</ul>
</small>
         <button type="submit">Submit</button>
    </form>
     </div>
</body>
</html>
