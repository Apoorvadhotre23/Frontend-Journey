<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <h4>Registration Form</h4>
    <form action="#">
        <label for="username">Name</label>
        <input type="text" id="username" required> <br> <br>

        <label for="email">Email</label>
        <input type="email" id="email" required> <br><br>

         <label for="password">Password</label>
        <input type="password" id="password" required> <br><br>

        <h3>Gender</h3>
        <label for="male">Male</label>
        <input type="radio"  name="gender" id="male">

        <label for="female">Female</label>
        <input type="radio"  name="gender" id="female">

        <h3>Hobbies</h3>

        <label for="read">Reading</label>
        <input type="checkbox" name="hobby" id="read">  <br><br>

        <label for="write">Writing</label>
        <input type="checkbox" name="hobby" id="write"> <br><br>

        <label for="dance">Soft Skills</label>
        <input type="checkbox" name="hobby" id="dance"> <br><br>
         

        <fieldset style="display: inline-block;">
            <legend>Tecnical Skills</legend>

            <label for="java">Java</label>
            <input type="checkbox" id="java"> 

            <label for="py">Python</label>
            <input type="checkbox" id="py">

            <label for="db">Database</label>
            <input type="checkbox" id="db">

            <label for="bc">Backend</label>
            <input type="checkbox" id="bc">
        </fieldset> <br> <br>
        
        <button>Submit</button>
    </form>
</body>
</html>
