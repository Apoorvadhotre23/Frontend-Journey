<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
     <h3>Registration Form</h3>
     <form action="#">

         <label for="name">Name</label>
        <input type="text" id="name"> <br><br>

        <label for="email">Email</label>
        <input type="email" id="email"> <br><br>

        <label for="password">Password</label>
        <input type="password" id="password"> <br><br>

        <h4>Gender</h4>
        <label for="male">Male</label>
        <input type="radio"  name="gender" id="male">

        <label for="female">Female</label> 
        <input type="radio"  name="gender" id="female"> <br> <br>

        <label for="message">Message</label> <br>
        <textarea id="message" name="message" required rows="5" cols="30"></textarea> <br><br>

        
        <fieldset style="display: inline-block;">
            <legend>Tecnical Skills</legend>

            <label for="java">Java</label>
            <input type="checkbox" id="java"> 

            <label for="py">Python</label>
            <input type="checkbox" id="py">

            <label for="db">Database</label>
            <input type="checkbox" id="db">

            <label for="bc">Backend</label>
            <input type="checkbox" id="bc">
        </fieldset> <br> <br>

        <h3>Country</h3>
        <select name="Country">
            <option value="india">India</option>
            <option value="usa">USA</option>
            <option value="germany">Germany</option>
            <option value="japan">Japan</option>
        </select> <br> <br>

        <label for="file">Upload File</label>
        <input type="file" id="file"> <br> <br>

        <button type="submit" >Submit</button> 
        <button type="reset">Reset</button>

     </form>
       
</body>
</html>
