<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>

    <style>
        table {
            border-collapse:collapse;
        }
         table, th, td {
            border: 2px solid black;
            padding: 10px;
            /* border-style: dashed; */  
        }
    </style>
</head>
<body>
    <h3>Student Tables</h3>
     <table>
        <tr>
            <th>Name</th>
            <th>City</th>
            <th>Company</th>
        </tr>

        <tr>
            <td>Apoorva</td>
            <td>Banglore</td>
            <td>Infosys</td>
        </tr>

        <tr>
            <td>Narendra</td>
            <td>Banglore</td>
            <td>TCS</td>
        </tr>

        <tr>
            <td>Pinky</td>
            <td>Indore</td>
            <td>Accenture</td>

        </tr>
    </table>

    <br><br> <h3>When you use collapse, the borders of adjacent cells are combined into one border.</h3>
</body>
</html>
