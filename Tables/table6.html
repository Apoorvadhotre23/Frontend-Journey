<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>

    <style>
        table {
            border-collapse: collapse;
        }

        th, tr, td {
            border: 1px solid black;
            padding: 4px;
        }
    </style>
</head>
<body>

    <table>

  <thead>
    <tr>
      <th>Name</th>
      <th>City</th>
    </tr>
  </thead>

  <tbody>
    <tr>
      <td>Apoorva</td>
      <td>Bangalore</td>
    </tr>
    <tr>
      <td>Narendra</td>
      <td>Bangalore</td>
    </tr>
  </tbody>

  <tfoot>
    <tr>
      <td colspan="2">Total: 2</td>
    </tr>
  </tfoot>

</table>
</body>
</html>
