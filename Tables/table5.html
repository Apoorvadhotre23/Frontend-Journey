<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>

    <style>
        table, th, td{
            border-collapse: collapse;
            border: 2px solid black;
            padding: 5px;
        }
    </style>
</head>
<body>
    
    <table>
        <tr>
            <th colspan="2">Full Name</th>
            <th>Location</th>
        </tr>
        <tr>
            <td>Apoorva</td>
            <td>Dhotre</td>
            <td>Pune</td>
        </tr>

        <tr>
            <td>Narendra</td>
            <td>Chillal</td>
            <td>Mumbai</td>
        </tr>
    </table>
</body>
</html>
